# Configuration utilisateur (côté agent)
configSchema:
  type: object
  required:
    - gapup_api_key
  properties:
    gapup_api_key:
      type: string
      title: "Gapup API Key"
      description: "Free 100 calls/mo. Key at hub.gapup.io/agents-api/onboard"
    gapup_api_base_url:
      type: string
      title: "API Base URL (optional)"
      description: "Override Gapup API endpoint. Default: https://hub.gapup.io"
      default: "https://hub.gapup.io"
