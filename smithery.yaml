# Smithery — listing manifest for gapup-mcp (HTTP-hosted MCP server)
# Doc : https://smithery.ai/docs
# Live listing : https://smithery.ai/server/gapup-team/gapup-mcp
#
# Publication :
#   npm install -g @smithery/cli
#   smithery login
#   smithery mcp publish https://mcp.gapup.io/mcp -n gapup-team/gapup-mcp
#
# (Voir LISTING-PUBLICATION.md pour le step-by-step + Bazaar.)

name: gapup-team/gapup-mcp
displayName: "Gapup MCP — Agent-payable C-suite expertises"
description: >
  183 MCP tools (100+ C-suite expertises) — competitive intelligence, SEC filing decoder,
  sanctions screener multi-jurisdiction (OFAC + EU + UK + UN + SECO + SEMA + DFAT + PEP +
  adverse media), KYC, pentest scope estimator, attack surface monitor (passive recon +
  CVE/EPSS/KEV), clinical evidence briefer (PubMed + ClinicalTrials.gov + OpenFDA, GRADE-graded),
  real estate deal screener (EU-first moat — DVF Cerema + Géorisques), domain tech fingerprint
  (dual-use CMO/CISO), industry classifier NAICS/SIC/NACE/GICS/ISIC/HS, research paper Q&A
  (OpenAlex + Semantic Scholar + CORE, evidence-grounded with DOI citations), sentiment news
  pulse (GDELT crisis detection), infra blueprint designer (AWS/GCP/Azure pricing-aware),
  AI Act / GDPR / ESRS / Sharia compliance audits, FTG trade intelligence (market gap,
  sourcing, Africa corridors), content data layer (gold-standard metadata
  games/films/TV/music), live financial data, patent landscape async, weather & climate
  risk, tax compliance multi-jurisdiction, crypto/on-chain wallet intelligence, talent
  intelligence & salary benchmarking, T6 batch flagships, diaspora-ready multilingual
  search (ZH/IN/MENA). Pricing x402 native (T0 $0.002 → T6 $1.50 batch flagship).
  Cerebras-backed agent mode <30s p99. Dual-audience format (human/agent).
  Free tier 100 calls/mo, no credit card.

homepage: https://hub.gapup.io/agents-api
repository: https://github.com/getgapup/gapup-mcp-public
license: SEE LICENSE IN FILE

# Transport HTTP hébergé (Streamable HTTP MCP).
remote:
  url: https://mcp.gapup.io/mcp
  transport: streamable-http
  auth: x402   # Pay-per-call via x402 USDC/EURC (Base + Optimism). Free tier 100 calls/mo.

