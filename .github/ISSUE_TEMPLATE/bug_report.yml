name: Bug report
description: Report unexpected behavior from a tool on `mcp.gapup.io`
title: "[bug] <tool> — <one-line summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please confirm:
        - You hit `https://mcp.gapup.io/mcp` (not a fork).
        - `https://mcp.gapup.io/health` shows the endpoint is up.
        - There is no existing issue describing the same behavior.
        - This is **not** a security issue (those go to `agents@gapup.io` — see [SECURITY.md](../SECURITY.md)).
  - type: input
    id: tool
    attributes:
      label: Tool name
      description: Exact name as returned by `tools/list`.
      placeholder: "competitor-intel"
    validations:
      required: true
  - type: input
    id: audience
    attributes:
      label: Audience parameter
      description: Were you calling with `audience: human` or `audience: agent`?
      placeholder: "agent"
    validations:
      required: false
  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: The JSON arguments you passed to the tool. Redact secrets.
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to receive?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did you receive? Paste the full response if reasonable; redact PII.
      render: json
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: Client
      description: Which MCP client / SDK / language did you use?
      placeholder: "Claude Code 2.x / TypeScript SDK 1.4.0"
    validations:
      required: false
  - type: input
    id: timestamp
    attributes:
      label: Timestamp (UTC)
      description: Approximate time the bug occurred — helps us cross-reference logs.
      placeholder: "2026-05-23T14:32:00Z"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Workarounds tried, related issues, etc.
    validations:
      required: false
