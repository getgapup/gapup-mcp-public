<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background plate (1:1, solid gold matching brand badges #c9a84c) -->
  <rect width="512" height="512" rx="96" fill="#0b0d12"/>

  <!-- Inner highlight ring -->
  <rect x="32" y="32" width="448" height="448" rx="72" fill="none" stroke="#c9a84c" stroke-width="6" opacity="0.4"/>

  <!-- Wordmark "G" — serif, gold -->
  <text x="256" y="332"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="320"
        fill="#c9a84c"
        letter-spacing="-12">G</text>

  <!-- Sub-mark "MCP" — small caps, gold dim -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="600"
        font-size="44"
        fill="#c9a84c"
        opacity="0.78"
        letter-spacing="8">MCP</text>
</svg>
