<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background plate -->
  <rect width="512" height="512" rx="96" fill="#0b0d12"/>

  <!-- Subtle gold ring -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.35"/>

  <!-- Big "185+" — the proof-of-scale anchor -->
  <text x="256" y="248"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-weight="800"
        font-size="180"
        fill="#c9a84c"
        letter-spacing="-6">185+</text>

  <!-- Thin gold rule under the number -->
  <line x1="128" y1="290" x2="384" y2="290" stroke="#c9a84c" stroke-width="3" opacity="0.6"/>

  <!-- Sub-label "TOOLS" — context for the number -->
  <text x="256" y="332"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-weight="600"
        font-size="32"
        fill="#c9a84c"
        opacity="0.78"
        letter-spacing="14">TOOLS</text>

  <!-- Wordmark "GAPUP MCP" -->
  <text x="256" y="416"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-weight="700"
        font-size="52"
        fill="#ffffff"
        letter-spacing="4">GAPUP</text>

  <text x="256" y="464"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-weight="600"
        font-size="28"
        fill="#c9a84c"
        opacity="0.85"
        letter-spacing="12">MCP</text>
</svg>
